<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockBoard · 股票交易論壇</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --brand: #1a73e8;
      --brand-light: #e8f0fe;
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1c1e21;
      --sub: #65676b;
      --border: #e4e6eb;
      --green: #1b9e4b;
      --red: #e53935;
      --sidebar-w: 240px;
      --topbar-h: 56px;
      --radius: 10px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* ── Auth ──────────────────────────────────────── */
    .auth-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.55);
      backdrop-filter:blur(4px);
      display:flex; align-items:center; justify-content:center;
      z-index:2000; transition:opacity .3s,visibility .3s;
    }
    .auth-overlay.hidden { opacity:0; visibility:hidden; pointer-events:none; }
    .auth-card {
      background:white; border-radius:16px;
      box-shadow:0 24px 80px rgba(0,0,0,.2);
      width:100%; max-width:420px; padding:2.5rem;
      animation:authIn .35s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes authIn { from{opacity:0;transform:scale(.92) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .auth-logo { display:flex; align-items:center; gap:.5rem; margin-bottom:1.75rem; }
    .auth-logo .li { width:36px; height:36px; background:var(--brand); border-radius:8px; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:1.1rem; }
    .auth-logo span { font-size:1.2rem; font-weight:700; }
    .auth-card h2 { font-size:1.5rem; font-weight:700; margin-bottom:.3rem; }
    .auth-card p  { color:var(--sub); font-size:.9rem; margin-bottom:1.75rem; }
    .auth-field { margin-bottom:1.1rem; }
    .auth-field label { display:block; font-size:.78rem; font-weight:700; color:var(--sub); margin-bottom:.375rem; text-transform:uppercase; letter-spacing:.04em; }
    .auth-field input { width:100%; padding:.8rem 1rem; border:1.5px solid var(--border); border-radius:8px; font-size:.95rem; font-family:inherit; background:#fafafa; transition:all .2s; }
    .auth-field input:focus { outline:none; border-color:var(--brand); box-shadow:0 0 0 3px rgba(26,115,232,.12); background:white; }
    .auth-btn { width:100%; padding:.875rem; background:var(--brand); color:white; border:none; border-radius:8px; font-size:1rem; font-weight:600; font-family:inherit; cursor:pointer; transition:background .2s; margin-top:.5rem; }
    .auth-btn:hover { background:#1557b0; }
    .auth-btn:disabled { background:#b0bec5; cursor:not-allowed; }
    .wakeup { display:none; margin-top:1rem; padding:.75rem 1rem; background:#fff8e1; border:1px solid #ffe082; border-radius:8px; font-size:.84rem; color:#7a5c00; text-align:center; }
    .spin { display:inline-block; width:13px; height:13px; border:2px solid #ffe082; border-top-color:#f59e0b; border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; margin-right:5px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .auth-switch { text-align:center; margin-top:1.25rem; font-size:.9rem; color:var(--sub); }
    .auth-switch a { color:var(--brand); font-weight:600; cursor:pointer; }

    /* ── Topbar ────────────────────────────────────── */
    .topbar {
      position:fixed; top:0; left:0; right:0; height:var(--topbar-h);
      background:white; border-bottom:1px solid var(--border);
      display:flex; align-items:center; padding:0 1.25rem; gap:1rem; z-index:100;
    }
    .topbar-logo { display:flex; align-items:center; gap:.5rem; text-decoration:none; flex-shrink:0; }
    .topbar-logo .li { width:32px; height:32px; background:var(--brand); border-radius:7px; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:.95rem; }
    .topbar-logo span { font-size:1.1rem; font-weight:700; color:var(--text); }
    .topbar-search { flex:1; max-width:480px; display:flex; align-items:center; background:var(--bg); border-radius:20px; padding:0 1rem; height:36px; gap:.5rem; margin:0 1rem; }
    .topbar-search input { flex:1; border:none; background:transparent; font-size:.9rem; font-family:inherit; }
    .topbar-search input:focus { outline:none; }
    .topbar-right { margin-left:auto; display:flex; align-items:center; gap:.75rem; }
    .topbar-user { display:flex; align-items:center; gap:.5rem; }
    .t-avatar { width:32px; height:32px; border-radius:50%; background:var(--brand); display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:.85rem; cursor:pointer; }
    .t-name { font-size:.9rem; font-weight:600; cursor:pointer; }
    .t-name:hover { color:var(--brand); text-decoration:underline; }
    .btn-logout { padding:.4rem .9rem; border:1.5px solid var(--border); border-radius:20px; background:white; font-size:.85rem; font-family:inherit; cursor:pointer; color:var(--sub); transition:all .2s; }
    .btn-logout:hover { border-color:var(--red); color:var(--red); }

    /* ── Layout ────────────────────────────────────── */
    .app { display:flex; padding-top:var(--topbar-h); min-height:100vh; }

    /* ── Left Sidebar ──────────────────────────────── */
    .sidebar {
      width:var(--sidebar-w); position:fixed;
      top:var(--topbar-h); bottom:0; left:0;
      background:white; border-right:1px solid var(--border);
      overflow-y:auto; padding:1rem 0;
    }
    .sb-label { font-size:.7rem; font-weight:700; color:var(--sub); letter-spacing:.08em; text-transform:uppercase; padding:.75rem 1.25rem .35rem; }
    .sb-item {
      display:flex; align-items:center; gap:.75rem;
      padding:.65rem 1.25rem; font-size:.9rem; font-weight:500;
      color:var(--text); cursor:pointer;
      border-left:3px solid transparent; transition:all .15s;
    }
    .sb-item:hover { background:var(--brand-light); color:var(--brand); }
    .sb-item.active { background:var(--brand-light); color:var(--brand); border-left-color:var(--brand); font-weight:600; }
    .sb-icon { width:22px; text-align:center; font-size:1.05rem; }

    /* 左側快捷功能區 */
    .sb-action {
      margin:0 .75rem .5rem;
      padding:.7rem 1rem;
      background:var(--brand); color:white;
      border:none; border-radius:8px;
      font-size:.9rem; font-weight:600; font-family:inherit;
      cursor:pointer; display:flex; align-items:center; gap:.5rem;
      transition:background .2s; width:calc(100% - 1.5rem);
    }
    .sb-action:hover { background:#1557b0; }

    /* ── Main ──────────────────────────────────────── */
    .main { margin-left:var(--sidebar-w); flex:1; padding:1.25rem; max-width:860px; }

    /* ── Page 切換 ─────────────────────────────────── */
    .page { display:none; }
    .page.active { display:block; }

    /* ── Feed ──────────────────────────────────────── */
    .compose-box { background:white; border-radius:var(--radius); border:1px solid var(--border); padding:1rem 1.25rem; margin-bottom:1rem; }
    .compose-row { display:flex; gap:.75rem; align-items:center; }
    .c-avatar { width:36px; height:36px; border-radius:50%; background:var(--brand); display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:.85rem; flex-shrink:0; }
    .compose-trigger { flex:1; padding:.65rem 1rem; border:1.5px solid var(--border); border-radius:20px; font-size:.9rem; color:var(--sub); cursor:pointer; background:var(--bg); transition:all .2s; text-align:left; font-family:inherit; }
    .compose-trigger:hover { border-color:var(--brand); background:white; color:var(--text); }

    /* Post card */
    .post-card { background:white; border-radius:var(--radius); border:1px solid var(--border); margin-bottom:.75rem; transition:box-shadow .2s; }
    .post-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.08); }
    .pc-head { padding:1rem 1.25rem .6rem; }
    .pc-author { display:flex; align-items:center; gap:.6rem; margin-bottom:.6rem; }
    .pc-ava { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#1a73e8,#34a853); display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:.82rem; flex-shrink:0; cursor:pointer; }
    .pc-ava:hover { opacity:.85; }
    .pc-info { flex:1; }
    .pc-name { font-size:.88rem; font-weight:600; cursor:pointer; }
    .pc-name:hover { color:var(--brand); text-decoration:underline; }
    .pc-time { font-size:.75rem; color:var(--sub); }
    .pc-tag { font-size:.7rem; padding:.15rem .5rem; background:var(--brand-light); color:var(--brand); border-radius:4px; font-weight:600; }
    .pc-title { font-size:1rem; font-weight:700; margin-bottom:.4rem; line-height:1.4; }
    .pc-body { font-size:.875rem; color:var(--sub); line-height:1.6; margin-bottom:.5rem; }
    .pc-foot { padding:.5rem 1rem; border-top:1px solid var(--border); display:flex; }
    .pc-action { display:flex; align-items:center; gap:.4rem; padding:.45rem .75rem; border-radius:6px; font-size:.83rem; color:var(--sub); cursor:pointer; background:none; border:none; font-family:inherit; transition:all .15s; }
    .pc-action:hover { background:var(--bg); color:var(--brand); }

    /* Comments */
    .comments-area { display:none; padding:0 1.25rem 1rem; border-top:1px solid var(--border); }
    .comments-area.open { display:block; }
    .cm-list { margin:.75rem 0; }
    .cm-row { display:flex; gap:.6rem; margin-bottom:.6rem; }
    .cm-ava { width:28px; height:28px; border-radius:50%; background:var(--bg); border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:.7rem; font-weight:700; flex-shrink:0; }
    .cm-bubble { background:var(--bg); border-radius:0 10px 10px 10px; padding:.5rem .75rem; font-size:.84rem; line-height:1.5; }
    .cm-meta { font-size:.75rem; font-weight:600; margin-bottom:.2rem; }
    .cm-input-row { display:flex; gap:.6rem; align-items:center; margin-top:.5rem; }
    .cm-input { flex:1; padding:.5rem .9rem; border:1.5px solid var(--border); border-radius:20px; font-size:.875rem; font-family:inherit; transition:border-color .2s; background:var(--bg); }
    .cm-input:focus { outline:none; border-color:var(--brand); background:white; }
    .cm-send { padding:.45rem 1rem; background:var(--brand); color:white; border:none; border-radius:20px; font-size:.83rem; font-weight:600; font-family:inherit; cursor:pointer; }

    /* ── Stock Panel ───────────────────────────────── */
    .widget { background:white; border-radius:var(--radius); border:1px solid var(--border); margin-bottom:1rem; overflow:hidden; }
    .wh { padding:.875rem 1.1rem; border-bottom:1px solid var(--border); font-size:.9rem; font-weight:700; display:flex; align-items:center; justify-content:space-between; }
    .wb { padding:1rem 1.1rem; }
    .stock-row { display:flex; gap:.5rem; margin-bottom:.75rem; }
    .stock-row input { flex:1; padding:.55rem .75rem; border:1.5px solid var(--border); border-radius:7px; font-size:.875rem; font-family:inherit; text-transform:uppercase; }
    .stock-row input:focus { outline:none; border-color:var(--brand); }
    .btn-q { padding:.55rem .9rem; background:var(--brand); color:white; border:none; border-radius:7px; font-size:.85rem; font-family:inherit; cursor:pointer; }
    .stock-info { display:none; }
    .stock-info.show { display:block; }
    .si-name { font-size:.82rem; color:var(--sub); margin-bottom:.15rem; }
    .si-price { font-size:1.8rem; font-weight:700; color:var(--green); }
    .si-hl { font-size:.78rem; color:var(--sub); margin:.15rem 0 .75rem; }
    .period-row { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
    .pp { padding:.2rem .6rem; border:1px solid var(--border); border-radius:12px; font-size:.78rem; cursor:pointer; font-family:inherit; color:var(--sub); background:white; }
    .pp.active { background:var(--brand); color:white; border-color:var(--brand); }
    .chart-wrap { height:160px; }

    /* ── Trade Panel ───────────────────────────────── */
    .trade-grid { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; }
    .tf label { display:block; font-size:.75rem; font-weight:600; color:var(--sub); margin-bottom:.25rem; }
    .tf input, .tf select { width:100%; padding:.5rem .6rem; border:1.5px solid var(--border); border-radius:7px; font-size:.85rem; font-family:inherit; }
    .tf input:focus, .tf select:focus { outline:none; border-color:var(--brand); }
    .btn-trade { width:100%; margin-top:.6rem; padding:.65rem; background:var(--brand); color:white; border:none; border-radius:7px; font-size:.9rem; font-weight:600; font-family:inherit; cursor:pointer; }
    .trade-list-item { display:flex; justify-content:space-between; align-items:center; padding:.55rem 0; border-bottom:1px solid var(--border); font-size:.85rem; }
    .trade-list-item:last-child { border-bottom:none; }
    .trade-sym { font-weight:700; }
    .trade-badge { font-size:.72rem; padding:.1rem .45rem; border-radius:4px; font-weight:600; margin-left:.35rem; }
    .trade-badge.buy { background:#e8f5e9; color:var(--green); }
    .trade-badge.sell { background:#fce8e8; color:var(--red); }

    /* ── Profile Page ──────────────────────────────── */
    .profile-banner { height:160px; background:linear-gradient(135deg,#1a73e8 0%,#34a853 100%); border-radius:var(--radius) var(--radius) 0 0; position:relative; }
    .profile-card { background:white; border:1px solid var(--border); border-radius:var(--radius); margin-bottom:1rem; overflow:hidden; }
    .profile-info { padding:0 1.5rem 1.5rem; position:relative; }
    .profile-ava-wrap { margin-top:-44px; margin-bottom:.75rem; }
    .profile-ava { width:88px; height:88px; border-radius:50%; border:4px solid white; background:var(--brand); display:flex; align-items:center; justify-content:center; color:white; font-size:2rem; font-weight:700; }
    .profile-name { font-size:1.3rem; font-weight:700; margin-bottom:.2rem; }
    .profile-handle { font-size:.88rem; color:var(--sub); margin-bottom:.75rem; }
    .profile-stats { display:flex; gap:1.5rem; margin-bottom:1rem; }
    .ps-item { text-align:center; }
    .ps-num { font-size:1.1rem; font-weight:700; }
    .ps-label { font-size:.75rem; color:var(--sub); }
    .follow-btn {
      padding:.55rem 1.5rem; border-radius:20px; font-size:.9rem; font-weight:600;
      font-family:inherit; cursor:pointer; transition:all .2s;
    }
    .follow-btn.follow { background:var(--brand); color:white; border:none; }
    .follow-btn.follow:hover { background:#1557b0; }
    .follow-btn.following { background:white; color:var(--text); border:1.5px solid var(--border); }
    .follow-btn.following:hover { border-color:var(--red); color:var(--red); }
    .own-profile-btn { padding:.55rem 1.25rem; border-radius:20px; font-size:.9rem; font-weight:600; font-family:inherit; cursor:pointer; background:white; color:var(--text); border:1.5px solid var(--border); }
    .profile-posts-title { font-size:.95rem; font-weight:700; padding:.75rem 1.5rem; border-top:1px solid var(--border); border-bottom:1px solid var(--border); }

    /* ── Modal ─────────────────────────────────────── */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; z-index:1500; opacity:0; visibility:hidden; transition:all .2s; }
    .modal-bg.show { opacity:1; visibility:visible; }
    .modal { background:white; border-radius:14px; width:100%; max-width:560px; box-shadow:0 20px 60px rgba(0,0,0,.2); overflow:hidden; transform:scale(.95); transition:transform .25s; }
    .modal-bg.show .modal { transform:scale(1); }
    .modal-head { padding:1rem 1.25rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .modal-head h3 { font-size:1rem; font-weight:700; }
    .modal-x { width:30px; height:30px; border-radius:50%; border:none; background:var(--bg); cursor:pointer; font-size:1rem; color:var(--sub); display:flex; align-items:center; justify-content:center; }
    .modal-body { padding:1.25rem; }
    .mf { margin-bottom:1rem; }
    .mf label { display:block; font-size:.82rem; font-weight:600; color:var(--sub); margin-bottom:.375rem; }
    .mf input, .mf textarea { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; font-size:.92rem; font-family:inherit; transition:border-color .2s; }
    .mf input:focus, .mf textarea:focus { outline:none; border-color:var(--brand); }
    .modal-foot { padding:.875rem 1.25rem; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:.75rem; }
    .btn-cancel { padding:.6rem 1.25rem; border:1.5px solid var(--border); border-radius:20px; background:white; cursor:pointer; font-size:.9rem; font-family:inherit; color:var(--sub); }
    .btn-post { padding:.6rem 1.5rem; border:none; border-radius:20px; background:var(--brand); color:white; font-size:.9rem; font-weight:600; font-family:inherit; cursor:pointer; }

    /* ── Empty / Toast ─────────────────────────────── */
    .empty { text-align:center; padding:2.5rem 1rem; color:var(--sub); font-size:.9rem; }
    .toast { position:fixed; bottom:1.5rem; right:1.5rem; background:#1c1e21; color:white; padding:.7rem 1.2rem; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.2); transform:translateY(80px); opacity:0; transition:all .3s; z-index:3000; font-size:.9rem; }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast.error { background:var(--red); }
    .toast.success { background:var(--green); }

    /* ── Edit Profile Modal ─────────────────────────── */
    .board-tag {
      display:inline-flex; align-items:center; gap:.4rem;
      padding:.35rem .85rem; border-radius:20px;
      font-size:.82rem; font-weight:600; cursor:pointer;
      border:1.5px solid var(--border); background:white; font-family:inherit;
      transition:all .2s; color:var(--text);
    }
    .board-tag:hover { border-color:var(--brand); color:var(--brand); background:var(--brand-light); }
    .board-tag.active { background:var(--brand); color:white; border-color:var(--brand); }
    .board-filter-row { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem; }

    /* Bio text */
    .profile-bio { font-size:.88rem; color:var(--sub); margin-bottom:.75rem; font-style:italic; }

    @media(max-width:768px) {
      .sidebar { display:none; }
      .main { margin-left:0; }
    }
  </style>
</head>
<body>

<!-- Auth -->
<div id="authOverlay" class="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="li">S</div><span>StockBoard</span>
    </div>
    <h2 id="authTitle">歡迎回來</h2>
    <p id="authSub">登入以繼續使用所有功能</p>
    <form id="authForm">
      <div class="auth-field"><label>帳號</label><input type="text" id="authUser" placeholder="輸入帳號" required autocomplete="username"></div>
      <div class="auth-field"><label>密碼</label><input type="password" id="authPass" placeholder="輸入密碼" required autocomplete="current-password"></div>
      <button type="submit" class="auth-btn" id="authBtn">登入</button>
    </form>
    <div id="wakeup" class="wakeup"><span class="spin"></span><strong>伺服器喚醒中，請稍候...</strong></div>
    <div class="auth-switch"><span id="authSwitchText">還沒有帳號？</span><a id="authSwitchLink">立即註冊</a></div>
  </div>
</div>

<!-- Post Modal -->
<div id="postModal" class="modal-bg">
  <div class="modal">
    <div class="modal-head"><h3>建立新文章</h3><button class="modal-x" id="closeModal">✕</button></div>
    <div class="modal-body">
      <div class="mf"><label>標題</label><input type="text" id="postTitle" placeholder="文章標題" required></div>
      <div class="mf"><label>內容</label><textarea id="postContent" rows="5" placeholder="分享你的投資想法..." required></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" id="cancelPost">取消</button>
      <button class="btn-post" id="submitPost">發布文章</button>
    </div>
  </div>
</div>

<!-- Edit Profile Modal -->
<div id="editProfileModal" class="modal-bg">
  <div class="modal">
    <div class="modal-head"><h3>編輯個人資料</h3><button class="modal-x" id="closeEditProfile">✕</button></div>
    <div class="modal-body">
      <div class="mf"><label>顯示名稱</label><input type="text" id="editDisplayName" placeholder="你的顯示名稱" maxlength="20"></div>
      <div class="mf"><label>自我介紹</label><textarea id="editBio" rows="3" placeholder="介紹一下自己...（最多100字）" maxlength="100"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" id="cancelEditProfile">取消</button>
      <button class="btn-post" id="saveEditProfile">儲存</button>
    </div>
  </div>
</div>

<!-- Topbar -->
<header class="topbar">
  <a class="topbar-logo" href="#"><div class="li">S</div><span>StockBoard</span></a>
  <div class="topbar-search">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" placeholder="搜尋股票、文章...">
  </div>
  <div class="topbar-right">
    <div class="topbar-user" id="topbarUser" style="display:none">
      <div class="t-avatar" id="topbarAva" onclick="viewProfile(null)"></div>
      <span class="t-name" id="topbarName" onclick="viewProfile(null)"></span>
      <button class="btn-logout" id="logoutBtn">登出</button>
    </div>
  </div>
</header>

<!-- App -->
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div style="padding:.75rem .75rem .5rem">
      <button class="sb-action" id="sidebarPost">✏️ 發布文章</button>
    </div>
    <div class="sb-label">功能</div>
    <div class="sb-item active" data-page="forum"><span class="sb-icon">📋</span> 討論板</div>
    <div class="sb-item" data-page="stock"><span class="sb-icon">📈</span> 股票查詢</div>
    <div class="sb-item" data-page="trades"><span class="sb-icon">💼</span> 交易紀錄</div>
    <div class="sb-item" data-page="profile-self"><span class="sb-icon">👤</span> 我的檔案</div>
    <div class="sb-label">看板</div>
    <div class="sb-item"><span class="sb-icon">🇹🇼</span> 台股</div>
    <div class="sb-item"><span class="sb-icon">🇺🇸</span> 美股</div>
    <div class="sb-item"><span class="sb-icon">₿</span> 加密貨幣</div>
    <div class="sb-item"><span class="sb-icon">💡</span> 投資新手</div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- 討論板 -->
    <div id="page-forum" class="page active">
      <div class="board-filter-row">
        <button class="board-tag active" data-board="all">🔥 全部</button>
        <button class="board-tag" data-board="台股">🇹🇼 台股</button>
        <button class="board-tag" data-board="美股">🇺🇸 美股</button>
        <button class="board-tag" data-board="加密貨幣">₿ 加密貨幣</button>
        <button class="board-tag" data-board="投資新手">💡 投資新手</button>
      </div>
      <div class="compose-box">
        <div class="compose-row">
          <div class="c-avatar" id="composeAva"></div>
          <button class="compose-trigger" id="openPostModal">有什麼投資想法想分享嗎？</button>
        </div>
      </div>
      <div id="postsList"></div>
    </div>

    <!-- 股票查詢 -->
    <div id="page-stock" class="page">
      <div class="widget">
        <div class="wh">股票即時查詢</div>
        <div class="wb">
          <div class="stock-row">
            <input type="text" id="stockQ" placeholder="輸入代號，如 AAPL 或 0050">
            <button class="btn-q" id="searchStock">查詢</button>
          </div>
          <div id="stockInfo" class="stock-info">
            <div class="si-name" id="siName"></div>
            <div class="si-price" id="siPrice"></div>
            <div class="si-hl" id="siHL"></div>
            <div class="period-row" id="periodRow">
              <button class="pp active" data-p="5d">5天</button>
              <button class="pp" data-p="1mo">1月</button>
              <button class="pp" data-p="3mo">3月</button>
              <button class="pp" data-p="6mo">6月</button>
              <button class="pp" data-p="1y">1年</button>
            </div>
            <div class="chart-wrap"><canvas id="stockChart"></canvas></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 交易紀錄 -->
    <div id="page-trades" class="page">
      <div class="widget">
        <div class="wh">新增交易</div>
        <div class="wb">
          <form id="tradeForm">
            <div class="trade-grid">
              <div class="tf"><label>股票代號</label><input type="text" id="tradeSym" placeholder="如 0050" required></div>
              <div class="tf"><label>買 / 賣</label><select id="tradeType"><option value="buy">買入</option><option value="sell">賣出</option></select></div>
              <div class="tf"><label>成交價</label><input type="number" id="tradePrice" placeholder="0.00" min="0" step="0.01" required></div>
              <div class="tf"><label>股數</label><input type="number" id="tradeQty" placeholder="100" min="1" required></div>
            </div>
            <button type="submit" class="btn-trade">送出交易</button>
          </form>
        </div>
      </div>
      <div class="widget">
        <div class="wh">交易歷史</div>
        <div class="wb" id="tradesList"><div class="empty">尚無紀錄</div></div>
      </div>
    </div>

    <!-- 個人檔案（自己）-->
    <div id="page-profile-self" class="page">
      <div id="selfProfileContent"></div>
    </div>

    <!-- 個人檔案（他人）-->
    <div id="page-profile-other" class="page">
      <div id="otherProfileContent"></div>
    </div>

  </main>
</div>

<div id="toast" class="toast"></div>

<script>
const API = 'https://web-design-67t2.onrender.com';
let isReg = false, stockChart = null, curSym = '', wakeTimer = null;

// ── 追蹤資料（存在 localStorage，因後端無追蹤 API）────────
function getFollowing() { try { return JSON.parse(localStorage.getItem('following')||'[]'); } catch{return[];} }
function setFollowing(arr) { localStorage.setItem('following', JSON.stringify(arr)); }
function isFollowing(username) { return getFollowing().includes(username); }
function toggleFollow(username) {
  let arr = getFollowing();
  if (arr.includes(username)) arr = arr.filter(u => u !== username);
  else arr.push(username);
  setFollowing(arr);
}

// ── Utils ─────────────────────────────────────────────────
function esc(s) {
  if (s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function timeAgo(d) {
  const s = (Date.now()-new Date(d))/1000;
  if (s<60) return '剛剛';
  if (s<3600) return Math.floor(s/60)+'分鐘前';
  if (s<86400) return Math.floor(s/3600)+'小時前';
  return Math.floor(s/86400)+'天前';
}
function ava(name) { return name?name[0].toUpperCase():'?'; }
function uid() { return parseInt(localStorage.getItem('user_id')||'0'); }
function uname() { return localStorage.getItem('username')||''; }
function normTicker(s) {
  let sym = s.trim().toUpperCase().replace(/\.TW$/i,'');
  if (/^TW\d/.test(sym)) sym = sym.slice(2);
  if (/^\d{4,5}[A-Z]?$/.test(sym)) sym += '.TW';
  return sym;
}
function toast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent=msg; t.className=`toast show ${type}`;
  setTimeout(()=>t.className='toast',3000);
}
function showWake() { document.getElementById('wakeup').style.display='block'; }
function hideWake() { document.getElementById('wakeup').style.display='none'; if(wakeTimer){clearTimeout(wakeTimer);wakeTimer=null;} }
function startWake() { wakeTimer=setTimeout(showWake,4000); }
async function fetchWT(url,opts={},ms=90000) {
  const c=new AbortController(); const t=setTimeout(()=>c.abort(),ms);
  try { return await fetch(url,{...opts,signal:c.signal}); }
  catch(e){ throw new Error(e.name==='AbortError'?'伺服器逾時，請稍後再試':'無法連線'); }
  finally{ clearTimeout(t); }
}

// ── Page routing ──────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const el = document.getElementById('page-'+id);
  if (el) el.classList.add('active');
  document.querySelectorAll('.sb-item[data-page]').forEach(i=>i.classList.toggle('active', i.dataset.page===id));
}

document.querySelectorAll('.sb-item[data-page]').forEach(el => {
  el.addEventListener('click', () => {
    const pg = el.dataset.page;
    if (pg === 'profile-self') { renderSelfProfile(); }
    showPage(pg);
  });
});

// ── Auth ──────────────────────────────────────────────────
function updateAuthUI() {
  document.getElementById('authTitle').textContent    = isReg?'建立帳號':'歡迎回來';
  document.getElementById('authSub').textContent      = isReg?'填寫以下資料完成註冊':'登入以繼續使用所有功能';
  document.getElementById('authBtn').textContent      = isReg?'註冊':'登入';
  document.getElementById('authSwitchText').textContent = isReg?'已有帳號？':'還沒有帳號？';
  document.getElementById('authSwitchLink').textContent = isReg?'立即登入':'立即註冊';
}
document.getElementById('authSwitchLink').onclick = () => { isReg=!isReg; updateAuthUI(); };

document.getElementById('authForm').addEventListener('submit', async e => {
  e.preventDefault();
  const username=document.getElementById('authUser').value.trim();
  const password=document.getElementById('authPass').value;
  const btn=document.getElementById('authBtn');
  btn.disabled=true; btn.textContent=isReg?'註冊中...':'登入中...';
  startWake();
  try {
    if (isReg) {
      const r=await fetchWT(`${API}/register/`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
      if (!r.ok) { const e=await r.json(); throw new Error(e.detail||'註冊失敗'); }
      toast('註冊成功！請登入','success'); isReg=false; updateAuthUI();
    } else {
      const r=await fetchWT(`${API}/login/`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
      if (!r.ok) { const e=await r.json(); throw new Error(e.detail||'登入失敗'); }
      const d=await r.json();
      localStorage.setItem('user_id',d.user_id); localStorage.setItem('username',d.username);
      toast('登入成功！','success'); checkAuth();
    }
  } catch(err) { toast(err.message,'error'); }
  finally { hideWake(); btn.disabled=false; btn.textContent=isReg?'註冊':'登入'; }
});

document.getElementById('logoutBtn').onclick = () => {
  localStorage.removeItem('user_id'); localStorage.removeItem('username');
  isReg=false; updateAuthUI(); document.getElementById('authForm').reset();
  toast('已登出'); checkAuth();
};

function checkAuth() {
  const id=uid(), name=uname();
  if (id) {
    document.getElementById('authOverlay').classList.add('hidden');
    document.getElementById('topbarUser').style.display='flex';
    document.getElementById('topbarName').textContent=name;
    document.getElementById('topbarAva').textContent=ava(name);
    document.getElementById('composeAva').textContent=ava(name);
    loadPosts(); loadTrades();
  } else {
    document.getElementById('authOverlay').classList.remove('hidden');
    document.getElementById('topbarUser').style.display='none';
  }
}

// ── Posts ─────────────────────────────────────────────────
document.getElementById('sidebarPost').onclick = () => document.getElementById('postModal').classList.add('show');
document.getElementById('openPostModal').onclick = () => document.getElementById('postModal').classList.add('show');
document.getElementById('closeModal').onclick = () => document.getElementById('postModal').classList.remove('show');
document.getElementById('cancelPost').onclick  = () => document.getElementById('postModal').classList.remove('show');

document.getElementById('submitPost').onclick = async () => {
  const title=document.getElementById('postTitle').value.trim();
  const content=document.getElementById('postContent').value.trim();
  if (!title||!content) { toast('請填寫標題和內容','error'); return; }
  try {
    const r=await fetch(`${API}/posts/`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid(),title,content})});
    if (!r.ok) { const e=await r.json(); throw new Error(e.detail||'失敗'); }
    toast('文章發布成功！','success');
    document.getElementById('postTitle').value=''; document.getElementById('postContent').value='';
    document.getElementById('postModal').classList.remove('show');
    loadPosts();
  } catch(err) { toast(err.message,'error'); }
};

let allPosts = [];
async function loadPosts() {
  try {
    const r=await fetch(`${API}/posts/`); if (!r.ok) throw new Error();
    allPosts=await r.json();
    renderPosts(allPosts, 'postsList');
  } catch(e){ console.error(e); }
}

function renderPosts(posts, containerId) {
  const c=document.getElementById(containerId);
  if (!c) return;
  if (!posts.length) { c.innerHTML='<div class="empty">目前還沒有文章，來發表第一篇吧！</div>'; return; }
  c.innerHTML=posts.map(post=>`
    <div class="post-card">
      <div class="pc-head">
        <div class="pc-author">
          <div class="pc-ava" onclick="viewProfile('${esc(post.username)}')">${esc(ava(post.username))}</div>
          <div class="pc-info">
            <div class="pc-name" onclick="viewProfile('${esc(post.username)}')">${esc(post.username)}</div>
            <div class="pc-time">${timeAgo(post.created_at)}</div>
          </div>
          <span class="pc-tag">股票</span>
        </div>
        <div class="pc-title">${esc(post.title)}</div>
        <div class="pc-body">${esc(post.content)}</div>
      </div>
      <div class="pc-foot">
        <button class="pc-action" onclick="toggleCm(${post.id})">💬 ${(post.comments||[]).length} 則留言</button>
      </div>
      <div class="comments-area" id="cm_${post.id}">
        <div class="cm-list">
          ${(post.comments||[]).map(c=>`
            <div class="cm-row">
              <div class="cm-ava">${esc(ava(c.username))}</div>
              <div class="cm-bubble">
                <div class="cm-meta">${esc(c.username)} · <span style="font-weight:400;color:var(--sub)">${timeAgo(c.created_at)}</span></div>
                ${esc(c.content)}
              </div>
            </div>
          `).join('')}
        </div>
        <div class="cm-input-row">
          <div class="cm-ava">${esc(ava(uname()))}</div>
          <input class="cm-input" id="cmi_${post.id}" placeholder="留言...">
          <button class="cm-send" onclick="sendComment(${post.id})">送出</button>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleCm(id) { document.getElementById(`cm_${id}`)?.classList.toggle('open'); }
async function sendComment(postId) {
  const inp=document.getElementById(`cmi_${postId}`);
  const content=inp?.value.trim(); if (!content) { toast('請輸入留言','error'); return; }
  try {
    const r=await fetch(`${API}/comments/`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid(),post_id:postId,content})});
    if (!r.ok) { const e=await r.json(); throw new Error(e.detail||'失敗'); }
    toast('留言成功！','success'); loadPosts();
  } catch(err) { toast(err.message,'error'); }
}

// ── Profile ───────────────────────────────────────────────
function renderSelfProfile() {
  const name=uname();
  const myPosts=allPosts.filter(p=>p.username===name);
  const following=getFollowing();
  document.getElementById('selfProfileContent').innerHTML = `
    <div class="profile-card">
      <div class="profile-banner"></div>
      <div class="profile-info">
        <div class="profile-ava-wrap"><div class="profile-ava">${esc(ava(name))}</div></div>
        <div class="profile-name">${esc(name)}</div>
        <div class="profile-handle">@${esc(name.toLowerCase())}</div>
        ${getBio() ? `<div class="profile-bio">${esc(getBio())}</div>` : ''}
        <div class="profile-stats">
          <div class="ps-item"><div class="ps-num">${myPosts.length}</div><div class="ps-label">文章</div></div>
          <div class="ps-item"><div class="ps-num">${following.length}</div><div class="ps-label">追蹤中</div></div>
        </div>
        <button class="own-profile-btn" onclick="openEditProfile()">編輯個人資料</button>
      </div>
      <div class="profile-posts-title">我的文章（${myPosts.length}）</div>
      <div id="selfPosts" style="padding:0 1.25rem 1rem"></div>
    </div>
  `;
  renderPosts(myPosts, 'selfPosts');
}

function viewProfile(username) {
  if (!username || username === uname()) {
    renderSelfProfile();
    showPage('profile-self');
    return;
  }
  const theirPosts = allPosts.filter(p => p.username === username);
  const following = isFollowing(username);
  document.getElementById('otherProfileContent').innerHTML = `
    <div class="profile-card">
      <div class="profile-banner" style="background:linear-gradient(135deg,#34a853,#1a73e8)"></div>
      <div class="profile-info">
        <div class="profile-ava-wrap"><div class="profile-ava" style="background:linear-gradient(135deg,#34a853,#1a73e8)">${esc(ava(username))}</div></div>
        <div class="profile-name">${esc(username)}</div>
        <div class="profile-handle">@${esc(username.toLowerCase())}</div>
        <div class="profile-stats">
          <div class="ps-item"><div class="ps-num">${theirPosts.length}</div><div class="ps-label">文章</div></div>
        </div>
        <button class="follow-btn ${following?'following':'follow'}" id="followBtn" onclick="handleFollow('${esc(username)}')">
          ${following?'追蹤中':'追蹤'}
        </button>
      </div>
      <div class="profile-posts-title">${esc(username)} 的文章（${theirPosts.length}）</div>
      <div id="otherPosts" style="padding:0 1.25rem 1rem"></div>
    </div>
  `;
  renderPosts(theirPosts, 'otherPosts');
  showPage('profile-other');
}

function handleFollow(username) {
  toggleFollow(username);
  const btn = document.getElementById('followBtn');
  const now = isFollowing(username);
  btn.textContent = now ? '追蹤中' : '追蹤';
  btn.className = `follow-btn ${now?'following':'follow'}`;
  toast(now ? `已追蹤 ${username}` : `已取消追蹤 ${username}`, 'success');
}

// ── Trades ────────────────────────────────────────────────
async function loadTrades() {
  const id=uid(); if (!id) return;
  try {
    const r=await fetch(`${API}/trades/${id}`); if (!r.ok) throw new Error();
    const trades=await r.json();
    const el=document.getElementById('tradesList');
    if (!trades.length) { el.innerHTML='<div class="empty">尚無交易紀錄</div>'; return; }
    el.innerHTML=trades.map(t=>`
      <div class="trade-list-item">
        <div>
          <span class="trade-sym">${esc(t.stock_symbol)}</span>
          <span class="trade-badge ${t.trade_type==='buy'?'buy':'sell'}">${t.trade_type==='buy'?'買入':'賣出'}</span>
          <span style="font-size:.75rem;color:var(--sub);margin-left:.35rem">${new Date(t.trade_date).toLocaleDateString('zh-TW')}</span>
        </div>
        <div>
          <strong>$${parseFloat(t.price).toFixed(2)}</strong>
          <span style="font-size:.75rem;color:var(--sub);margin-left:.35rem">${parseInt(t.quantity)}股</span>
        </div>
      </div>
    `).join('');
  } catch(e){ console.error(e); }
}

document.getElementById('tradeForm').addEventListener('submit', async e => {
  e.preventDefault();
  const data={ user_id:uid(), stock_symbol:document.getElementById('tradeSym').value.trim().toUpperCase(), trade_type:document.getElementById('tradeType').value, price:parseFloat(document.getElementById('tradePrice').value), quantity:parseInt(document.getElementById('tradeQty').value) };
  try {
    const r=await fetch(`${API}/trades/`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    if (!r.ok) { const e=await r.json(); throw new Error(e.detail||'失敗'); }
    toast('交易新增成功！','success'); e.target.reset(); loadTrades();
  } catch(err) { toast(err.message,'error'); }
});

// ── Stock ─────────────────────────────────────────────────
document.getElementById('searchStock').onclick = async () => {
  const sym=normTicker(document.getElementById('stockQ').value); if (!sym) { toast('請輸入代號','error'); return; }
  curSym=sym;
  try {
    const r=await fetch(`${API}/stock/${encodeURIComponent(sym)}`);
    if (!r.ok) { const e=await r.json(); throw new Error(e.detail||'找不到'); }
    const d=await r.json();
    document.getElementById('siName').textContent=`${d.name} (${d.symbol})`;
    document.getElementById('siPrice').textContent=`$${d.current_price.toFixed(2)}`;
    document.getElementById('siHL').textContent=`今日高 $${d.high.toFixed(2)} · 今日低 $${d.low.toFixed(2)}`;
    document.getElementById('stockInfo').classList.add('show');
    await loadHistory(sym,'1mo');
  } catch(err) { toast(err.message,'error'); }
};

async function loadHistory(sym, period) {
  try {
    const r=await fetch(`${API}/stock/${encodeURIComponent(sym)}/history?period=${period}`);
    if (!r.ok) throw new Error('走勢載入失敗');
    const data=await r.json();
    if (stockChart) stockChart.destroy();
    const ctx=document.getElementById('stockChart').getContext('2d');
    stockChart=new Chart(ctx,{
      type:'line',
      data:{ labels:data.map(d=>d.date), datasets:[{label:'收盤價',data:data.map(d=>d.close),borderColor:'#1a73e8',backgroundColor:'rgba(26,115,232,.08)',borderWidth:2,pointRadius:data.length>60?0:2,fill:true,tension:.3}] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{ticks:{maxTicksLimit:6}},y:{ticks:{callback:v=>'$'+v}}} }
    });
  } catch(err) { toast(err.message,'error'); }
}

document.querySelectorAll('#periodRow .pp').forEach(btn => {
  btn.addEventListener('click', async () => {
    document.querySelectorAll('#periodRow .pp').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if (curSym) await loadHistory(curSym, btn.dataset.p);
  });
});

// ── Init ──────────────────────────────────────────────────
checkAuth();
</script>
</body>
</html>
